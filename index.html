<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRE Credit Memo Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:       #0a1628;
      --navy2:      #1e3a5f;
      --blue:       #2563eb;
      --blue-light: #3b82f6;
      --bg:         #f0f4ff;
      --card:       #ffffff;
      --text:       #0f172a;
      --muted:      #64748b;
      --border:     #e2e8f0;
      --green:      #10b981;
      --green-bg:   #d1fae5;
      --green-text: #065f46;
      --yellow:     #f59e0b;
      --yellow-bg:  #fef3c7;
      --yellow-text:#92400e;
      --red:        #ef4444;
      --red-bg:     #fee2e2;
      --red-text:   #991b1b;
      --mono:       'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── HEADER ── */
    .top-bar {
      background: var(--navy);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .top-bar-left { display: flex; align-items: center; gap: 14px; }
    .logo-box {
      width: 36px; height: 36px;
      background: var(--blue);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .top-bar h1 { font-size: 17px; font-weight: 700; color: white; letter-spacing: -0.2px; }
    .top-bar p { font-size: 12px; color: rgba(255,255,255,0.4); }
    .top-tag {
      background: rgba(37,99,235,0.25);
      border: 1px solid rgba(37,99,235,0.4);
      color: #93c5fd;
      font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 99px;
      letter-spacing: 0.04em;
    }

    /* ── LAYOUT ── */
    .shell { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 64px); }

    /* ── LEFT PANEL ── */
    .left-panel {
      background: var(--navy);
      padding: 24px 16px;
      border-right: 1px solid rgba(255,255,255,0.06);
      display: flex; flex-direction: column; gap: 6px;
    }
    .panel-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      padding: 0 10px; margin: 12px 0 4px;
    }
    .panel-label:first-child { margin-top: 0; }

    /* Property type selector cards */
    .prop-btn {
      display: flex; align-items: center; gap: 12px;
      width: 100%; border: 0;
      background: transparent;
      padding: 12px 14px;
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      border: 1px solid transparent;
      font-family: inherit;
    }
    .prop-btn:hover { background: rgba(255,255,255,0.06); }
    .prop-btn.active {
      background: rgba(37,99,235,0.18);
      border-color: rgba(37,99,235,0.45);
    }
    .prop-icon {
      width: 38px; height: 38px; flex-shrink: 0;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      background: rgba(255,255,255,0.07);
    }
    .prop-btn.active .prop-icon { background: rgba(37,99,235,0.3); }
    .prop-name { font-size: 13.5px; font-weight: 600; color: rgba(255,255,255,0.65); }
    .prop-sub  { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 2px; }
    .prop-btn.active .prop-name { color: #93c5fd; }
    .prop-btn.active .prop-sub  { color: rgba(147,197,253,0.6); }

    .left-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 8px 4px; }

    /* ── RIGHT PANEL ── */
    .right-panel { padding: 28px 32px; overflow-y: auto; }

    /* Property type header */
    .prop-header {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .prop-header-icon {
      width: 52px; height: 52px; flex-shrink: 0;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      background: linear-gradient(135deg, #dbeafe, #e0e7ff);
    }
    .prop-header-text h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.4px; }
    .prop-header-text p  { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .prop-type-badge {
      margin-left: auto;
      background: var(--navy);
      color: #93c5fd;
      font-size: 11px; font-weight: 700;
      padding: 5px 12px; border-radius: 99px;
      letter-spacing: 0.05em; text-transform: uppercase;
    }

    /* ── LIVE METRIC CARDS ── */
    .metric-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .live-metric {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }
    .live-metric::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 0 0 14px 14px;
    }
    .lm-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
    .lm-value { font-family: var(--mono); font-size: 22px; font-weight: 600; margin: 6px 0 2px; letter-spacing: -0.5px; }
    .lm-status { font-size: 11px; font-weight: 600; }
    .lm-green::after  { background: var(--green); }
    .lm-yellow::after { background: var(--yellow); }
    .lm-red::after    { background: var(--red); }
    .lm-blue::after   { background: var(--blue); }
    .status-good   { color: var(--green); }
    .status-warn   { color: var(--yellow); }
    .status-bad    { color: var(--red); }
    .status-neutral{ color: var(--muted); }

    /* ── SECTIONS ── */
    .section { margin-bottom: 20px; }
    .section-title {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 13px; font-weight: 700;
      color: var(--text);
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--blue); flex-shrink: 0;
    }

    /* ── GRID ── */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

    /* ── FORM FIELDS ── */
    .field label {
      font-size: 11px; font-weight: 600;
      color: var(--muted);
      display: block; margin-bottom: 5px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .field input, .field select {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-size: 14px; font-family: var(--mono);
      background: white; color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus, .field select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .field .hint { font-size: 10px; color: var(--muted); margin-top: 4px; }

    /* ── RATIO TABLE ── */
    .ratio-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .ratio-table th {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--muted); text-align: left;
      padding: 8px 12px; border-bottom: 1px solid var(--border);
      background: #f8fafc;
    }
    .ratio-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
    }
    .ratio-table tr:last-child td { border-bottom: none; }
    .ratio-name  { font-weight: 600; color: var(--text); }
    .ratio-value { font-family: var(--mono); font-weight: 600; font-size: 14px; }
    .ratio-bench { color: var(--muted); font-size: 12px; }
    .badge {
      display: inline-block; padding: 3px 9px;
      border-radius: 99px; font-size: 11px; font-weight: 700;
    }
    .badge-green  { background: var(--green-bg);  color: var(--green-text); }
    .badge-yellow { background: var(--yellow-bg); color: var(--yellow-text); }
    .badge-red    { background: var(--red-bg);    color: var(--red-text); }
    .badge-grey   { background: #f1f5f9; color: var(--muted); }

    /* ── GENERATE BUTTON ── */
    .gen-row { display: flex; gap: 10px; margin-top: 20px; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, var(--blue), #4f46e5);
      color: white; border: 0;
      padding: 12px 22px; border-radius: 10px;
      font-weight: 700; font-size: 14px; font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(37,99,235,0.3);
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-outline {
      display: inline-flex; align-items: center; gap: 8px;
      background: white; color: var(--text);
      border: 1.5px solid var(--border);
      padding: 12px 20px; border-radius: 10px;
      font-weight: 600; font-size: 14px; font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .btn-outline:hover { border-color: var(--blue); color: var(--blue); }

    /* ── MEMO OUTPUT ── */
    .memo-wrap {
      background: var(--navy);
      border-radius: 14px;
      padding: 20px;
      margin-top: 20px;
    }
    .memo-placeholder {
      color: rgba(255,255,255,0.25);
      font-size: 13px; text-align: center;
      padding: 28px 0;
    }
    .memo-paper {
      background: white; border-radius: 10px;
      padding: 28px; line-height: 1.6;
    }
    .memo-paper h1 {
      font-size: 18px; font-weight: 800;
      text-align: center; text-decoration: underline;
      margin-bottom: 20px; color: var(--navy);
    }
    .memo-paper h2 {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      border-bottom: 2px solid var(--border);
      padding-bottom: 5px; margin: 18px 0 10px;
      color: var(--navy);
    }
    .memo-paper table { width: 100%; border-collapse: collapse; margin-bottom: 14px; font-size: 13px; }
    .memo-paper th, .memo-paper td { border: 1px solid #e2e8f0; padding: 8px 12px; text-align: left; }
    .memo-paper th { background: #f8fafc; font-weight: 700; }

    /* ── CREDIT RISK RATING ── */
    .risk-top-card { padding: 18px 20px; }
    .risk-top-inner { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
    .risk-badge-lg {
      width: 62px; height: 62px; flex-shrink: 0;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 800;
      letter-spacing: -0.2px;
      transition: background 0.15s, color 0.15s;
    }
    .risk-top-text { flex: 1; min-width: 180px; }
    .risk-top-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
    .risk-top-name  { font-size: 18px; font-weight: 800; margin-top: 2px; color: var(--text); }
    .risk-top-sub   { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .risk-trend-chip {
      padding: 6px 12px; border-radius: 99px;
      font-size: 11px; font-weight: 700;
      white-space: nowrap;
    }
    .risk-desc-hint { font-size: 11px; color: var(--muted); margin-top: 5px; line-height: 1.4; font-style: italic; }
    .risk-result table { margin-bottom: 0; }
    .risk-summary-box {
      margin-top: 12px; padding: 12px 14px;
      border-radius: 10px; background: #f8fafc;
      border: 1px solid var(--border);
      font-size: 13px;
    }

    /* ── TOOLTIP ── */
    .info-tip {
      display: inline-block; width: 16px; height: 16px;
      background: #e2e8f0; border-radius: 50%;
      font-size: 10px; font-weight: 700; color: var(--muted);
      text-align: center; line-height: 16px;
      cursor: help; flex-shrink: 0;
    }

    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .metric-strip { grid-template-columns: repeat(2,1fr); }
      .grid3 { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .grid2, .grid3 { grid-template-columns: 1fr; }
      .metric-strip { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-left">
    <div class="logo-box">🏗️</div>
    <div>
      <h1>CRE Credit Memo Tool</h1>
      <p>Commercial Real Estate Underwriting · Ratio Analysis · Memo Generator</p>
    </div>
  </div>
  <div class="top-tag">DEMO</div>
</div>

<div class="shell">

  <!-- ═══ LEFT: Property Type Selector ═══ -->
  <div class="left-panel">
    <div class="panel-label">Select Property Type</div>

    <button class="prop-btn active" onclick="setType('apartment')">
      <div class="prop-icon">🏠</div>
      <div>
        <div class="prop-name">Multifamily / Apartment</div>
        <div class="prop-sub">5+ units · Residential rental</div>
      </div>
    </button>

    <button class="prop-btn" onclick="setType('office')">
      <div class="prop-icon">🏢</div>
      <div>
        <div class="prop-name">Office</div>
        <div class="prop-sub">Class A / B / C · CBD or suburban</div>
      </div>
    </button>

    <button class="prop-btn" onclick="setType('retail')">
      <div class="prop-icon">🛍️</div>
      <div>
        <div class="prop-name">Retail / Strip Mall</div>
        <div class="prop-sub">Anchored or unanchored</div>
      </div>
    </button>

    <button class="prop-btn" onclick="setType('industrial')">
      <div class="prop-icon">🏭</div>
      <div>
        <div class="prop-name">Industrial / Warehouse</div>
        <div class="prop-sub">Flex · Distribution · Cold storage</div>
      </div>
    </button>

    <button class="prop-btn" onclick="setType('hotel')">
      <div class="prop-icon">🏨</div>
      <div>
        <div class="prop-name">Hospitality / Hotel</div>
        <div class="prop-sub">Full-service · Limited-service · Motel</div>
      </div>
    </button>

    <button class="prop-btn" onclick="setType('mixed')">
      <div class="prop-icon">🏙️</div>
      <div>
        <div class="prop-name">Mixed-Use</div>
        <div class="prop-sub">Residential + retail + office</div>
      </div>
    </button>

    <div class="left-divider"></div>
    <div class="panel-label">Coming Soon</div>

    <button class="prop-btn" style="opacity:0.4;cursor:not-allowed;">
      <div class="prop-icon">🏥</div>
      <div>
        <div class="prop-name">Healthcare / Medical</div>
        <div class="prop-sub">MOB · Skilled nursing · Senior</div>
      </div>
    </button>

    <button class="prop-btn" style="opacity:0.4;cursor:not-allowed;">
      <div class="prop-icon">⛽</div>
      <div>
        <div class="prop-name">Self-Storage</div>
        <div class="prop-sub">Climate-controlled · Drive-up</div>
      </div>
    </button>
  </div>

  <!-- ═══ RIGHT: Dynamic Content Panel ═══ -->
  <div class="right-panel" id="rightPanel">
    <!-- Populated by JS -->
  </div>

</div>

<script>

const TYPES = {

  apartment: {
    icon: '🏠',
    name: 'Multifamily / Apartment',
    desc: 'Residential income property — 5+ units. Key metrics focus on occupancy, rent roll, and unit economics.',
    badge: 'MULTIFAMILY',
    benchmarks: [
      { name: 'DSCR',             field: 'dscr',       bench: '≥ 1.20x',  good: v => v >= 1.20, warn: v => v >= 1.10 },
      { name: 'LTV',              field: 'ltv',        bench: '≤ 75%',    good: v => v <= 75,   warn: v => v <= 80  },
      { name: 'Cap Rate',         field: 'capRate',    bench: '4.5%–7%',  good: v => v >= 4.5 && v <= 8, warn: v => v >= 3.5 },
      { name: 'Debt Yield',       field: 'debtYield',  bench: '≥ 6.5%',   good: v => v >= 6.5,  warn: v => v >= 5.5 },
      { name: 'Break-Even Occ.',  field: 'breakeven',  bench: '≤ 85%',    good: v => v <= 85,   warn: v => v <= 90  },
      { name: 'Price / Unit',     field: 'priceUnit',  bench: 'Market-specific', good: null, warn: null },
    ],
    inputs: {
      property: [
        { id: 'units',       label: 'Number of Units',          type: 'number', placeholder: '48',     hint: 'Total rentable units' },
        { id: 'avgRent',     label: 'Average Rent / Unit / Mo', type: 'number', placeholder: '1850',   hint: 'Current in-place average rent' },
        { id: 'marketRent',  label: 'Market Rent / Unit / Mo',  type: 'number', placeholder: '2000',   hint: 'Comparable market rent' },
        { id: 'occupancy',   label: 'Physical Occupancy (%)',    type: 'number', placeholder: '94',     hint: 'Current % of units occupied' },
        { id: 'year',        label: 'Year Built',                type: 'number', placeholder: '1998',   hint: '' },
        { id: 'sqft',        label: 'Total Rentable SF',         type: 'number', placeholder: '42000',  hint: 'Net rentable area' },
      ],
      income: [
        { id: 'gpi',        label: 'Gross Potential Income ($/yr)', type: 'number', placeholder: '1065600', hint: 'Units × avg rent × 12' },
        { id: 'vacancy',    label: 'Vacancy & Credit Loss (%)',     type: 'number', placeholder: '6',       hint: 'Typical 5–10% for MF' },
        { id: 'otherInc',   label: 'Other Income ($/yr)',           type: 'number', placeholder: '24000',   hint: 'Parking, laundry, pet fees' },
        { id: 'expenses',   label: 'Operating Expenses ($/yr)',     type: 'number', placeholder: '320000',  hint: '35–45% of EGI is typical' },
        { id: 'reserves',   label: 'Replacement Reserves ($/yr)',   type: 'number', placeholder: '24000',   hint: '$500/unit/yr is standard' },
      ],
      debt: [
        { id: 'purchasePrice', label: 'Purchase Price / Value ($)', type: 'number', placeholder: '8500000', hint: '' },
        { id: 'loanAmount',    label: 'Loan Amount ($)',             type: 'number', placeholder: '6000000', hint: '' },
        { id: 'annualDS',      label: 'Annual Debt Service ($)',     type: 'number', placeholder: '380000',  hint: 'P&I payments per year' },
        { id: 'intRate',       label: 'Interest Rate (%)',           type: 'number', placeholder: '6.75',    hint: '' },
        { id: 'term',          label: 'Loan Term (years)',           type: 'number', placeholder: '10',      hint: '' },
        { id: 'amort',         label: 'Amortization (years)',        type: 'number', placeholder: '30',      hint: '' },
      ],
      collateral: [
        { id: 'collateralType', label: 'Primary Collateral Type',       type: 'select', options: ['First Mortgage / Deed of Trust','Leasehold Mortgage','Fee & Leasehold Combined'], hint: '' },
        { id: 'lienPosition',   label: 'Lien Position',                 type: 'select', options: ['1st Lien','2nd Lien / Mezzanine','Cross-Collateralized'], hint: '' },
        { id: 'asIsValue',      label: 'Appraised As-Is Value ($)',     type: 'number', placeholder: '8500000', hint: 'Most recent MAI appraisal, as-is basis' },
        { id: 'assignRents',    label: 'Assignment of Leases & Rents',  type: 'select', options: ['Yes — Recorded','Yes — Unrecorded','No'], hint: '' },
        { id: 'uccFiling',      label: 'UCC-1 Filing (Personal Prop.)', type: 'select', options: ['Yes','No'], hint: 'Covers FF&E / personal property' },
        { id: 'escrowReserves', label: 'Tax & Insurance Escrow ($/yr)', type: 'number', placeholder: '42500', hint: 'Monthly escrow × 12' },
      ],
      guaranty: [
        { id: 'guarantyType',       label: 'Guaranty Type',                 type: 'select', options: ['Full Recourse','Non-Recourse w/ Carve-Outs (Bad-Boy)','Limited / Partial Recourse','Non-Recourse (No Carve-Outs)'], hint: '' },
        { id: 'guarantorName',      label: 'Guarantor(s)',                  type: 'text',   placeholder: 'Principal(s) of Borrower', hint: 'Individual(s) or entity providing guaranty' },
        { id: 'guarantorNetWorth',  label: 'Guarantor Net Worth ($)',       type: 'number', placeholder: '7500000', hint: 'Per personal financial statement' },
        { id: 'guarantorLiquidity', label: 'Guarantor Liquidity ($)',       type: 'number', placeholder: '600000', hint: 'Cash & marketable securities' },
        { id: 'guarantyCoveragePct',label: 'Recourse Coverage (%)',         type: 'number', placeholder: '25', hint: 'Applies if limited / partial recourse' },
        { id: 'carveOuts',          label: 'Carve-Out Events',              type: 'text',   placeholder: 'Fraud, waste, misappropriation, environmental, bankruptcy', hint: 'Standard bad-boy carve-out triggers' },
      ]
    },
    specialMetrics: [
      { label: 'Rent / SF / Mo',    formula: (d) => d.avgRent && d.sqft && d.units ? '$ ' + (d.avgRent * d.units / d.sqft).toFixed(2) : '—' },

// LTV band ceilings mapped to CRR levels 1–10 (per underwriting grid: ≤50%, 51–60%, 61–65%, 65–70%, 71–75%, 75–80%, 81–85%, 85–90%, 91–95%, >95%)
const LTV_BAND_CEILINGS = [50, 60, 65, 70, 75, 80, 85, 90, 95];

function ltvToLevel(ltv) {
  if (!ltv || isNaN(ltv) || ltv <= 0) return null;
  for (let i = 0; i < LTV_BAND_CEILINGS.length; i++) {
    if (ltv <= LTV_BAND_CEILINGS[i]) return i + 1;
  }
  return 10;
}

// Repayment Behavior — auto-derived from DSCR
const DSCR_BANDS = [1.50, 1.35, 1.25, 1.15, 1.05, 1.00, 0.95, 0.85, 0.75]; // level 1..9 floors; below last => 10
function dscrToLevel(dscr) {
  if (!dscr || isNaN(dscr) || dscr <= 0) return null;
  for (let i = 0; i < DSCR_BANDS.length; i++) {
    if (dscr >= DSCR_BANDS[i]) return i + 1;
  }
  return 10;
}

// Financial Flexibility — auto-derived from Debt Yield
const DEBT_YIELD_BANDS = [12, 10, 9, 8, 7, 6, 5, 4, 3]; // level 1..9 floors; below last => 10
function debtYieldToLevel(dy) {
  if (!dy || isNaN(dy) || dy <= 0) return null;
  for (let i = 0; i < DEBT_YIELD_BANDS.length; i++) {
    if (dy >= DEBT_YIELD_BANDS[i]) return i + 1;
  }
  return 10;
}

function crrLevelInfo(n) {
  return CRR_LEVELS.find(l => l.n === Number(n)) || null;
}

// Weighting for the overall CRR (weighted average, rounded to nearest level)
const CRR_WEIGHTS = { repayment: 0.35, ltv: 0.30, financialFlex: 0.20, marketCond: 0.15 };

// Repayment Behavior, LTV, and Financial Flexibility are auto-calculated from ratios already on the form.
// Market Conditions has no reliable single ratio and stays a qualitative analyst selection.
function getRiskAssessment(m, d) {
  // Repayment Behavior — auto (DSCR)
  const rpLevel = dscrToLevel(m.dscr);

  // Financial Flexibility — auto (Debt Yield), adjusted for guarantor coverage of the loan
  const ffBase = debtYieldToLevel(m.debtYield);
  let ffLevel = ffBase;
  let ffModifierNote = '';
  if (ffBase !== null) {
    const loanAmt   = parseFloat(d.loanAmount || 0);
    const netWorth  = parseFloat(d.guarantorNetWorth || 0);
    const coverage  = (loanAmt > 0 && netWorth > 0) ? netWorth / loanAmt : null;
    if (coverage !== null && coverage >= 1.5) {
      ffLevel = Math.max(1, ffBase - 1);
      ffModifierNote = 'Improved 1 level — guarantor net worth covers ' + coverage.toFixed(2) + 'x the loan';
    } else if ((coverage !== null && coverage < 0.5) || d.guarantyType === 'Non-Recourse (No Carve-Outs)') {
      ffLevel = Math.min(10, ffBase + 1);
      ffModifierNote = (coverage !== null && coverage < 0.5)
        ? 'Worsened 1 level — guarantor net worth covers only ' + coverage.toFixed(2) + 'x the loan'
        : 'Worsened 1 level — loan is fully non-recourse with no carve-outs';
    }
  }

  // LTV — auto
  const ltvLevel = ltvToLevel(m.ltv);

  // Market Conditions — manual (qualitative, no reliable ratio available)
  const mcEl = document.getElementById('risk_marketCond');
  const mc = mcEl && mcEl.value ? Number(mcEl.value) : null;

  // Risk Trend / Rationale — manual, informational only (do not feed the numeric score)
  const trendEl     = document.getElementById('risk_trend');
  const rationaleEl = document.getElementById('risk_rationale');
  const trend     = trendEl ? trendEl.value : '';
  const rationale = rationaleEl ? rationaleEl.value : '';

  const complete = rpLevel !== null && ffLevel !== null && ltvLevel !== null && mc !== null;
  let overall = null, info = null;
  if (complete) {
    const weighted = (CRR_WEIGHTS.repayment * rpLevel)
                    + (CRR_WEIGHTS.ltv * ltvLevel)
                    + (CRR_WEIGHTS.financialFlex * ffLevel)
                    + (CRR_WEIGHTS.marketCond * mc);
    overall = Math.min(10, Math.max(1, Math.round(weighted)));
    info = crrLevelInfo(overall);
  }

  return { rpLevel, ffLevel, ffModifierNote, ltvLevel, mc, trend, rationale, overall, info, complete };
}

function calcEGI(d) {
  const gpi = parseFloat(d.gpi||0);
  const vac = parseFloat(d.vacancy||0);
  const recov = parseFloat(d.recov||0);
  const other = parseFloat(d.otherInc||d.pctRent||d.otherRev||0);
  return gpi * (1 - vac/100) + recov + other;
}

function calcNOI(d) {
  if (d.noi) return parseFloat(d.noi);
  const egi = calcEGI(d);
  const exp = parseFloat(d.expenses||0);
  const res = parseFloat(d.reserves||0);
  const tiLC = parseFloat(d.tiLC||0);
  return egi - exp - res - tiLC;
}

function getFieldVals() {
  const d = {};
  const cfg = TYPES[currentType];
  [...cfg.inputs.property, ...cfg.inputs.income, ...cfg.inputs.debt, ...cfg.inputs.collateral, ...cfg.inputs.guaranty].forEach(f => {
    const el = document.getElementById('f_' + f.id);
    if (el) d[f.id] = el.value;
  });
  return d;
}

function calcMetrics(d) {
  const noi        = calcNOI(d);
  const annualDS   = parseFloat(d.annualDS||0);
  const loanAmt    = parseFloat(d.loanAmount||0);
  const price      = parseFloat(d.purchasePrice||0);
  const occupancy  = parseFloat(d.occupancy||0);
  const dscr       = annualDS > 0 ? noi / annualDS : 0;
  const ltv        = price > 0 ? (loanAmt / price) * 100 : 0;
  const capRate    = price > 0 ? (noi / price) * 100 : 0;
  const debtYield  = loanAmt > 0 ? (noi / loanAmt) * 100 : 0;
  const walt       = parseFloat(d.walt||0);
  const clearHt    = parseFloat(d.clearHt||0);
  const revpar     = (parseFloat(d.adr||0)) * (occupancy/100);
  const anchorPct  = parseFloat(d.anchorPct||0);
  const retailOcc  = parseFloat(d.retailOcc||0);
  const breakeven  = noi && d.gpi ? (((parseFloat(d.expenses||0) + parseFloat(d.reserves||0) + annualDS) / parseFloat(d.gpi)) * 100) : 0;
  return { noi, dscr, ltv, capRate, debtYield, walt, clearHt, revpar, anchorPct, retailOcc, breakeven };
}

function statusBadge(bench, val) {
  if (val === 0 || isNaN(val)) return '<span class="badge badge-grey">—</span>';
  if (bench.good && bench.good(val)) return '<span class="badge badge-green">✓ Pass</span>';
  if (bench.warn && bench.warn(val)) return '<span class="badge badge-yellow">⚠ Review</span>';
  return '<span class="badge badge-red">✗ Flag</span>';
}

function statusClass(bench, val) {
  if (!bench.good || val === 0 || isNaN(val)) return 'lm-blue';
  if (bench.good(val)) return 'lm-green';
  if (bench.warn && bench.warn(val)) return 'lm-yellow';
  return 'lm-red';
}

function fmtVal(field, val) {
  if (!val || isNaN(val)) return '—';
  if (field === 'dscr' || field === 'walt') return val.toFixed(2) + 'x';
  if (field === 'ltv' || field === 'capRate' || field === 'debtYield' || field === 'occupancy' || field === 'anchorPct' || field === 'retailOcc' || field === 'breakeven') return val.toFixed(1) + '%';
  if (field === 'clearHt') return val.toFixed(0) + ' ft';
  if (field === 'revpar') return '$ ' + val.toFixed(2);
  return val.toFixed(2);
}

        </div>
        <div class="field">
          <label>Market Conditions <span class="info-tip" title="Qualitative — no reliable single ratio available; select the level matching current industry/market conditions">i</span></label>
          <select id="risk_marketCond" onchange="calcRisk()">
            <option value="">Select level…</option>
            ${CRR_LEVELS.map(l => `<option value="${l.n}">${l.n} — ${l.name}</option>`).join('')}
          </select>
          <div class="risk-desc-hint" id="desc_marketCond"></div>
        </div>
      </div>

      <div class="grid2" style="margin-top:12px;">
        <div class="field">
          <label>Risk Trend <span class="info-tip" title="Applicable for CRR 7–10 only (Special Mention through Loss)">i</span></label>
          <select id="risk_trend" onchange="calcRisk()">
            <option value="">N/A</option>
            <option>Improving</option>
            <option>Stable</option>
            <option>Under pressure</option>
          </select>
        </div>
        <div class="field">
          <label>Loan Grade Rationale</label>
          <textarea id="risk_rationale" rows="2" placeholder="e.g. Adequate DSCR; improved gross rental income; strong collateral value; experienced guarantor"
            oninput="calcRisk()"
            style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:inherit;resize:vertical;outline:none;"></textarea>
        </div>
      </div>

      <div class="risk-result" id="riskResultBox" style="margin-top:16px;"></div>
    </div>

    <div class="gen-row">
      <button class="btn-primary" onclick="generateMemo()">📄 Generate CRE Credit Memo</button>
      <button class="btn-outline" onclick="downloadMemo()">⬇ Download .txt</button>
      <button class="btn-outline" onclick="window.print()">🖨 Print / PDF</button>
    </div>

    <div class="memo-wrap" id="memoOut">
      <div class="memo-placeholder">Fill in the inputs above and click "Generate CRE Credit Memo" to produce a full underwriting memo for this property type.</div>
    </div>
  `;

  fillDefaults();
  liveCalc();
}

function fillDefaults() {
  const cfg = TYPES[currentType];
  [...cfg.inputs.property, ...cfg.inputs.income, ...cfg.inputs.debt, ...cfg.inputs.collateral, ...cfg.inputs.guaranty].forEach(f => {
    const el = document.getElementById('f_' + f.id);
    if (el && f.placeholder && el.type !== 'select') el.value = f.placeholder;
  });
}

function liveCalc() {
  const d = getFieldVals();
  const m = calcMetrics(d);
  const cfg = TYPES[currentType];

  cfg.benchmarks.forEach(b => {
    const val = m[b.field];
    const fmted = fmtVal(b.field, val);
    const rvEl = document.getElementById('rv_' + b.field);
    const rsEl = document.getElementById('rs_' + b.field);
    const lvEl = document.getElementById('lmv_' + b.field);
    const lsEl = document.getElementById('lms_' + b.field);
    const lmEl = document.getElementById('lm_' + b.field);
    if (rvEl) rvEl.textContent = fmted;
    if (rsEl) rsEl.innerHTML = statusBadge(b, val);
    if (lvEl) lvEl.textContent = fmted;
    if (lmEl) {
      lmEl.className = 'live-metric ' + statusClass(b, val);
    }
    if (lsEl) {
      if (!val || isNaN(val)) { lsEl.innerHTML = '<span class="status-neutral">Enter data below</span>'; return; }
      if (b.good && b.good(val)) lsEl.innerHTML = '<span class="status-good">✓ Passes benchmark</span>';
      else if (b.warn && b.warn(val)) lsEl.innerHTML = '<span class="status-warn">⚠ Borderline — review</span>';
      else lsEl.innerHTML = '<span class="status-bad">✗ Below threshold</span>';
    }
  });

  cfg.specialMetrics.forEach(sm => {
    const el = document.getElementById('sm_' + sm.label.replace(/[^a-z0-9]/gi,'_'));
    if (el) el.textContent = sm.formula(d);
  });

  calcRisk();
}

function calcRisk() {
  const d = getFieldVals();
  const m = calcMetrics(d);
  const risk = getRiskAssessment(m, d);

  // qualitative narrative tied to each computed/selected level (pulled from your original grid text)
  const showDesc = (id, arr, val) => {
    const el = document.getElementById(id);
    if (el) el.textContent = val ? arr[Number(val) - 1] : '';
  };
  showDesc('desc_repayment',     CRR_DESCRIPTIONS.repayment,     risk.rpLevel);
  showDesc('desc_financialFlex', CRR_DESCRIPTIONS.financialFlex, risk.ffLevel);
  showDesc('desc_marketCond',    CRR_DESCRIPTIONS.marketCond,    risk.mc);

  // auto display: Repayment Behavior (DSCR)
  const rpEl = document.getElementById('risk_repaymentAuto');
  if (rpEl) {
    rpEl.value = risk.rpLevel
      ? `Level ${risk.rpLevel} — ${crrLevelInfo(risk.rpLevel).name} (DSCR: ${m.dscr.toFixed(2)}x)`
      : '— (enter NOI & Annual Debt Service above)';
  }

  // auto display: LTV
  const ltvDisplayEl = document.getElementById('risk_ltvDisplay');
  if (ltvDisplayEl) {
    ltvDisplayEl.value = risk.ltvLevel
      ? `Level ${risk.ltvLevel} — ${crrLevelInfo(risk.ltvLevel).name} (${m.ltv.toFixed(1)}%)`
      : '— (enter Purchase Price & Loan Amount above)';
  }

  // auto display: Financial Flexibility (Debt Yield + guarantor modifier)
  const ffEl = document.getElementById('risk_financialFlexAuto');
  if (ffEl) {
    ffEl.value = risk.ffLevel
      ? `Level ${risk.ffLevel} — ${crrLevelInfo(risk.ffLevel).name} (Debt Yield: ${m.debtYield.toFixed(2)}%)`
      : '— (enter NOI & Loan Amount above)';
  }
  const ffHintEl = document.getElementById('desc_financialFlex');
  if (ffHintEl && risk.ffModifierNote) {
    ffHintEl.textContent = (ffHintEl.textContent ? ffHintEl.textContent + ' ' : '') + '· ' + risk.ffModifierNote;
  }

  // top valuation box
  const badgeLg   = document.getElementById('riskBadgeLg');
  const nameEl    = document.getElementById('riskTopName');
  const subEl     = document.getElementById('riskTopSub');
  const trendChip = document.getElementById('riskTrendChip');

  if (badgeLg) {
    badgeLg.textContent = risk.overall ? 'CRR ' + risk.overall : '—';
    badgeLg.style.background = risk.overall ? risk.info.color : '#e2e8f0';
    badgeLg.style.color = risk.overall ? '#ffffff' : '#64748b';
  }
  if (nameEl) nameEl.textContent = risk.overall ? risk.info.name : 'Not yet rated';
  if (subEl) {
    if (risk.overall) {
      subEl.textContent = 'Weighted average — Repayment 35% · LTV 30% · Financial Flexibility 20% · Market Conditions 15% — rounded to the nearest level.';
    } else {
      const missing = [];
      if (!risk.rpLevel) missing.push('NOI / Annual Debt Service (Repayment Behavior)');
      if (!risk.ltvLevel) missing.push('Purchase Price / Loan Amount (LTV)');
      if (!risk.ffLevel) missing.push('NOI / Loan Amount (Financial Flexibility)');
      if (!risk.mc) missing.push('Market Conditions selection');
      subEl.textContent = 'Missing: ' + missing.join(', ') + '.';
    }
  }
  if (trendChip) {
    if (risk.overall >= 7 && risk.trend) {
      trendChip.style.display = 'inline-block';
      trendChip.textContent = 'Trend: ' + risk.trend;
      trendChip.style.background = risk.trend === 'Improving' ? 'var(--green-bg)' : risk.trend === 'Stable' ? '#f1f5f9' : 'var(--red-bg)';
      trendChip.style.color = risk.trend === 'Improving' ? 'var(--green-text)' : risk.trend === 'Stable' ? 'var(--muted)' : 'var(--red-text)';
    } else {
      trendChip.style.display = 'none';
    }
  }

  // bottom breakdown / result panel
  const resultBox = document.getElementById('riskResultBox');
  if (resultBox) {
    const levelCell = (val) => {
      const info = val ? crrLevelInfo(Number(val)) : null;
      return info ? `${info.n} — ${info.name}` : '<span class="status-neutral">Pending</span>';
    };
    resultBox.innerHTML = `
      <table class="ratio-table">
        <thead><tr><th>Criterion</th><th>Weight</th><th>Assigned Level</th></tr></thead>
        <tbody>
          <tr><td class="ratio-name">Repayment Behavior (DSCR)</td><td>35%</td><td>${levelCell(risk.rpLevel)}</td></tr>
          <tr><td class="ratio-name">LTV</td><td>30%</td><td>${levelCell(risk.ltvLevel)}</td></tr>
          <tr><td class="ratio-name">Financial Flexibility (Debt Yield + Guarantor)</td><td>20%</td><td>${levelCell(risk.ffLevel)}</td></tr>
          <tr><td class="ratio-name">Market Conditions (analyst-selected)</td><td>15%</td><td>${levelCell(risk.mc)}</td></tr>
        </tbody>
      </table>
      <div class="risk-summary-box">
        <strong>Overall CRR (weighted avg, rounded):</strong> ${risk.overall ? risk.overall + ' — ' + risk.info.name : 'Pending — complete all four inputs above'}
        ${risk.overall >= 7 && risk.trend ? `<div style="margin-top:4px;color:var(--muted);">Risk Trend: ${risk.trend}</div>` : ''}
      </div>`;
  }
}

function generateMemo() {
  const d   = getFieldVals();
  const m   = calcMetrics(d);
  const cfg = TYPES[currentType];
  const today = new Date().toLocaleDateString();
  const risk = getRiskAssessment(m, d);

  const rows = (label, val) => `<tr><th>${label}</th><td>${val || 'N/A'}</td></tr>`;
  const benchRows = cfg.benchmarks.map(b => {
    const val = m[b.field];
    const status = !val || isNaN(val) ? 'N/A' : b.good && b.good(val) ? '✓ Pass' : b.warn && b.warn(val) ? '⚠ Review' : '✗ Flag';
    return `<tr><td>${b.name}</td><td><strong>${fmtVal(b.field, val)}</strong></td><td>${b.bench}</td><td>${status}</td></tr>`;
  }).join('');

  const specialRows = cfg.specialMetrics.map(sm =>
    `<tr><td>${sm.label}</td><td>${sm.formula(d)}</td></tr>`).join('');

  const rec = m.dscr >= 1.35 ? 'Recommend conditional approval. Property demonstrates strong debt service coverage and meets all primary underwriting thresholds. Subject to final appraisal, environmental review, and title clear.'
    : m.dscr >= 1.20 ? 'Recommend approval with conditions. Property meets minimum debt service requirements. Additional review of lease rollover risk, reserves, and market comparables required prior to commitment.'
    : m.dscr > 0 ? 'Recommend additional underwriting review or credit enhancement. DSCR is below preferred threshold. Consider loan restructuring, additional collateral, or guarantor support.'
    : 'Insufficient data to make a recommendation. Please complete all required fields.';

  document.getElementById('memoOut').innerHTML = `<div class="memo-paper" id="memoPaper">
    <h1>Commercial Real Estate Credit Memo</h1>
    <table>
      <tr><th>Property Type</th><th>Date</th><th>Analyst</th></tr>
      <tr><td>${cfg.name}</td><td>${today}</td><td>CRE Underwriting Team</td></tr>
    </table>
    <h2>Property Overview</h2>
    <table>
      ${rows('Property Type', cfg.name)}
      ${rows('Purchase Price / Value', d.purchasePrice ? '$ ' + parseFloat(d.purchasePrice).toLocaleString() : '—')}
      ${rows('Loan Amount', d.loanAmount ? '$ ' + parseFloat(d.loanAmount).toLocaleString() : '—')}
      ${rows('Interest Rate', d.intRate ? d.intRate + '%' : '—')}
      ${rows('Loan Term', d.term ? d.term + ' years' : '—')}
      ${rows('Amortization', d.amort ? d.amort + ' years' : '—')}
      ${rows('Annual Debt Service', d.annualDS ? '$ ' + parseFloat(d.annualDS).toLocaleString() : '—')}
    </table>
    <h2>Credit Risk Rating (CRR)</h2>
    <table>
      ${rows('Repayment Behavior <span style="font-weight:400;color:#64748b;">(35% wt · DSCR ' + (m.dscr ? m.dscr.toFixed(2) + 'x' : '—') + ')</span>', risk.rpLevel ? risk.rpLevel + ' — ' + crrLevelInfo(risk.rpLevel).name : '—')}
      ${rows('LTV <span style="font-weight:400;color:#64748b;">(30% wt · ' + (m.ltv ? m.ltv.toFixed(1) + '%' : '—') + ')</span>', risk.ltvLevel ? risk.ltvLevel + ' — ' + crrLevelInfo(risk.ltvLevel).name : '—')}
      ${rows('Financial Flexibility <span style="font-weight:400;color:#64748b;">(20% wt · Debt Yield ' + (m.debtYield ? m.debtYield.toFixed(2) + '%' : '—') + ')</span>', risk.ffLevel ? risk.ffLevel + ' — ' + crrLevelInfo(risk.ffLevel).name + (risk.ffModifierNote ? ' (' + risk.ffModifierNote + ')' : '') : '—')}
      ${rows('Market Conditions <span style="font-weight:400;color:#64748b;">(15% wt · analyst-selected)</span>', risk.mc ? risk.mc + ' — ' + crrLevelInfo(risk.mc).name : '—')}
      ${rows('Overall CRR (weighted avg, rounded)', risk.overall ? risk.overall + ' — ' + risk.info.name : 'Incomplete — not all criteria assessed')}
      ${rows('Risk Trend', risk.overall >= 7 ? (risk.trend || 'Not specified') : 'N/A (CRR 1–6)')}
      ${rows('Loan Grade Rationale', risk.rationale)}
    </table>
    <h2>Key Ratio Analysis</h2>
    <table>
      <tr><th>Metric</th><th>Calculated</th><th>Benchmark</th><th>Status</th></tr>
      ${benchRows}
    </table>
    <h2>NOI Build-Up</h2>
    <table>
      ${rows('Gross Potential Income', d.gpi ? '$ ' + parseFloat(d.gpi).toLocaleString() : '—')}
      ${rows('Vacancy & Credit Loss', d.vacancy ? '(' + d.vacancy + '%)' : '—')}
      ${rows('Other / Recovery Income', d.recov || d.otherInc || d.pctRent || d.otherRev ? '$ ' + parseFloat(d.recov||d.otherInc||d.pctRent||d.otherRev||0).toLocaleString() : '—')}
      ${rows('Effective Gross Income', '$ ' + calcEGI(d).toLocaleString(undefined,{maximumFractionDigits:0}))}
      ${rows('Operating Expenses', d.expenses ? '($ ' + parseFloat(d.expenses).toLocaleString() + ')' : '—')}
      ${rows('Capital Reserves', d.reserves ? '($ ' + parseFloat(d.reserves).toLocaleString() + ')' : '—')}
      ${rows('Net Operating Income (NOI)', '$ ' + m.noi.toLocaleString(undefined,{maximumFractionDigits:0}))}
      ${rows('Annual Debt Service', d.annualDS ? '($ ' + parseFloat(d.annualDS).toLocaleString() + ')' : '—')}
      ${rows('Cash Flow After Debt Service', d.annualDS ? '$ ' + (m.noi - parseFloat(d.annualDS)).toLocaleString(undefined,{maximumFractionDigits:0}) : '—')}
    </table>
    <h2>Property-Specific Metrics</h2>
    <table>${specialRows}</table>
    <h2>Collateral</h2>
    <table>
      ${rows('Primary Collateral Type', d.collateralType)}
      ${rows('Lien Position', d.lienPosition)}
      ${rows('Appraised As-Is Value', d.asIsValue ? '$ ' + parseFloat(d.asIsValue).toLocaleString() : '—')}
      ${rows('Assignment of Leases & Rents', d.assignRents)}
      ${rows('UCC-1 Filing (Personal Property)', d.uccFiling)}
      ${rows('Tax & Insurance Escrow ($/yr)', d.escrowReserves ? '$ ' + parseFloat(d.escrowReserves).toLocaleString() : '—')}
    </table>
    <h2>Guaranty</h2>
    <table>
      ${rows('Guaranty Type', d.guarantyType)}
      ${rows('Guarantor(s)', d.guarantorName)}
      ${rows('Guarantor Net Worth', d.guarantorNetWorth ? '$ ' + parseFloat(d.guarantorNetWorth).toLocaleString() : '—')}
      ${rows('Guarantor Liquidity', d.guarantorLiquidity ? '$ ' + parseFloat(d.guarantorLiquidity).toLocaleString() : '—')}
      ${rows('Recourse Coverage', d.guarantyCoveragePct ? d.guarantyCoveragePct + '%' : '—')}
      ${rows('Carve-Out Events', d.carveOuts)}
    </table>
    <h2>Strengths</h2>
    <ul>
      ${m.dscr >= 1.25 ? '<li>DSCR of ' + m.dscr.toFixed(2) + 'x meets or exceeds minimum underwriting threshold.</li>' : ''}
      ${m.ltv <= 70 ? '<li>LTV of ' + m.ltv.toFixed(1) + '% provides adequate equity cushion and loss protection.</li>' : ''}
      ${m.capRate >= 5.5 ? '<li>Cap rate of ' + m.capRate.toFixed(2) + '% reflects favorable risk-adjusted return.</li>' : ''}
      ${m.debtYield >= 7 ? '<li>Debt yield of ' + m.debtYield.toFixed(2) + '% exceeds lender minimum, reducing refinance risk.</li>' : ''}
      ${d.guarantorNetWorth && d.loanAmount && parseFloat(d.guarantorNetWorth) >= parseFloat(d.loanAmount) ? '<li>Guarantor net worth of $' + parseFloat(d.guarantorNetWorth).toLocaleString() + ' exceeds the loan amount, providing meaningful contingent repayment support.</li>' : ''}
      ${d.assignRents && d.assignRents.startsWith('Yes') ? '<li>Assignment of Leases & Rents is in place, strengthening lender collateral position.</li>' : ''}
      ${risk.overall && risk.overall <= 3 ? '<li>Overall Credit Risk Rating of ' + risk.overall + ' (' + risk.info.name + ') reflects a strong qualitative risk profile.</li>' : ''}
      <li>Property type (${cfg.name}) supported by underwriting guidelines with defined benchmark thresholds.</li>
    </ul>
    <h2>Risks & Mitigants</h2>
    <table>
      <tr><th>Risk</th><th>Mitigant / Required Action</th></tr>
      ${m.dscr < 1.25 && m.dscr > 0 ? '<tr><td>DSCR of ' + m.dscr.toFixed(2) + 'x is below preferred threshold.</td><td>Evaluate interest-only period, additional guaranty, or principal reduction.</td></tr>' : ''}
      ${m.ltv > 70 ? '<tr><td>LTV of ' + m.ltv.toFixed(1) + '% exceeds 70% preferred maximum.</td><td>Require additional equity contribution or mortgage insurance.</td></tr>' : ''}
      ${d.guarantyType === 'Non-Recourse (No Carve-Outs)' ? '<tr><td>Loan is fully non-recourse with no carve-outs.</td><td>Confirm collateral value and reserves are sufficient to cover full loan basis absent guarantor support.</td></tr>' : ''}
      ${d.guarantorNetWorth && d.loanAmount && parseFloat(d.guarantorNetWorth) < parseFloat(d.loanAmount) ? '<tr><td>Guarantor net worth is below the loan amount.</td><td>Consider additional guarantors, a corporate guaranty, or credit enhancement (LC, cash reserve).</td></tr>' : ''}
      ${risk.overall >= 7 ? '<tr><td>Overall Credit Risk Rating of ' + risk.overall + ' (' + risk.info.name + ') indicates elevated qualitative risk.</td><td>Escalate to special assets / workout group for enhanced monitoring; reassess collateral and guarantor support.</td></tr>' : ''}
      ${!risk.overall ? '<tr><td>Credit Risk Rating assessment is incomplete.</td><td>Complete the Financial Flexibility, Market Conditions, and Repayment Behavior selections to finalize the CRR.</td></tr>' : ''}
      <tr><td>Income based on borrower-provided financials, not yet verified.</td><td>Require full rent roll, 12-month operating statement, and independent MAI appraisal.</td></tr>
      <tr><td>Market and interest rate risk over loan term.</td><td>Structure interest rate cap or swap if floating rate. Stress test at +200bps.</td></tr>
    </table>
    <h2>Conditions to Approval</h2>
    <table>
      <tr><th>Condition</th><th>Status</th></tr>
      <tr><td>MAI Appraisal (review or full)</td><td>Required</td></tr>
      <tr><td>Phase I Environmental Site Assessment</td><td>Required</td></tr>
      <tr><td>Property Condition Report (PCR)</td><td>Required</td></tr>
      <tr><td>Rent Roll (signed leases or trailing T12)</td><td>Required</td></tr>
      <tr><td>Title Search & Title Insurance</td><td>Required</td></tr>
      <tr><td>Insurance — Property, Liability, Flood (if applicable)</td><td>Required</td></tr>
      <tr><td>Borrower Financial Statements (2 yrs + interim)</td><td>Required</td></tr>
      <tr><td>Guarantor Personal Financial Statements</td><td>Required</td></tr>
    </table>
    <h2>Preliminary Recommendation</h2>
    <p><strong>${rec}</strong></p>
    <p style="margin-top:8px;">${risk.overall ? 'Overall Credit Risk Rating (CRR): <strong>' + risk.overall + ' — ' + risk.info.name + '</strong>. This qualitative rating should be read alongside the quantitative recommendation above.' : 'Note: The Credit Risk Rating assessment has not been completed for this file.'}</p>
    <p style="font-size:12px;color:#64748b;margin-top:10px;">This memo is system-generated for demo purposes. All inputs should be verified against third-party sources prior to credit committee presentation.</p>
  </div>`;

  window.latestMemoText = document.getElementById('memoPaper').innerText;
}

function downloadMemo() {
  if (!window.latestMemoText) { generateMemo(); }
  const blob = new Blob([window.latestMemoText], { type: 'text/plain' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'cre-credit-memo-' + currentType + '.txt';
  link.click();
  URL.revokeObjectURL(link.href);
}

function setType(type) {
  currentType = type;
  document.querySelectorAll('.prop-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  window.latestMemoText = null;
  render();
}

render();
</script>
</body>
</html>
